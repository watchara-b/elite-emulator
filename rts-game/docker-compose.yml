version: '3.8'

services:
  # Game client (static files via nginx)
  game:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped

  # Relay server (WebSocket + API)
  relay:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/rooms"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
