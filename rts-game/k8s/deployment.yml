apiVersion: apps/v1
kind: Deployment
metadata:
  name: faction-wars-relay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: faction-wars-relay
  template:
    metadata:
      labels:
        app: faction-wars-relay
    spec:
      containers:
      - name: relay
        image: faction-wars-server:latest
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          value: "4000"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /api/rooms
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/rooms
            port: 4000
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: faction-wars-relay
spec:
  type: LoadBalancer
  selector:
    app: faction-wars-relay
  ports:
  - port: 4000
    targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faction-wars-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: faction-wars-game
  template:
    metadata:
      labels:
        app: faction-wars-game
    spec:
      containers:
      - name: nginx
        image: faction-wars-game:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: faction-wars-game
spec:
  type: LoadBalancer
  selector:
    app: faction-wars-game
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: relay-hpa
spec:
  scaleRef:
    apiVersion: apps/v1
    kind: Deployment
    name: faction-wars-relay
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
