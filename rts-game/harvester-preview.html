<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Harvester Preview</title>
<style>
body{background:#1a1a2e;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}
canvas{border:1px solid #333;margin:8px;image-rendering:pixelated}
.row{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{text-align:center;background:#12122a;padding:12px;border-radius:8px;border:1px solid #333}
h3{margin:4px 0;font-size:13px}
</style></head><body>
<h1>🚜 Harvester Drill Model Preview</h1>
<p>ทุก faction ใช้ model เดียวกัน แต่สีต่างกันตาม faction</p>
<div class="row" id="previews"></div>

<script>
// Helpers from sprites.js
function isoBox(x,cx,cy,w,h,d,topCol,leftCol,rightCol){
  var hw=w/2,hh=h/2;
  x.fillStyle=topCol;x.beginPath();x.moveTo(cx,cy-d-hh);x.lineTo(cx+hw,cy-d);x.lineTo(cx,cy-d+hh);x.lineTo(cx-hw,cy-d);x.closePath();x.fill();
  x.fillStyle=leftCol;x.beginPath();x.moveTo(cx-hw,cy-d);x.lineTo(cx,cy-d+hh);x.lineTo(cx,cy+hh);x.lineTo(cx-hw,cy);x.closePath();x.fill();
  x.fillStyle=rightCol;x.beginPath();x.moveTo(cx+hw,cy-d);x.lineTo(cx,cy-d+hh);x.lineTo(cx,cy+hh);x.lineTo(cx+hw,cy);x.closePath();x.fill();
}
function isoCylinder(x,cx,cy,rx,ry,h,topCol,bodyCol){
  x.fillStyle=bodyCol;x.beginPath();x.ellipse(cx,cy,rx,ry,0,0,Math.PI);x.lineTo(cx-rx,cy-h);x.ellipse(cx,cy-h,rx,ry,0,Math.PI,0,true);x.closePath();x.fill();
  x.fillStyle=topCol;x.beginPath();x.ellipse(cx,cy-h,rx,ry,0,0,Math.PI*2);x.fill();
}

var factions = [
  {name:'Thailand',main:'#c88818',dark:'#7a5518',light:'#e8a020',accent:'#f0c040'},
  {name:'Japan',main:'#cc1177',dark:'#880055',light:'#ff1493',accent:'#ff69b4'},
  {name:'Switzerland',main:'#8ab8e0',dark:'#4a7aa0',light:'#c0deff',accent:'#e0eeff'},
  {name:'Brazil',main:'#22aa44',dark:'#116622',light:'#33ff66',accent:'#88ff99'},
  {name:'Egypt',main:'#d4a800',dark:'#8a6e00',light:'#ffe040',accent:'#fff080'},
];

function drawHarvester(x, c, scale) {
  x.save();
  x.scale(scale, scale);
  // Shadow
  x.fillStyle='rgba(0,0,0,0.25)';x.beginPath();x.ellipse(16,28,14,3,0,0,Math.PI*2);x.fill();
  // === RED ALERT STYLE: top-down isometric ===
  // Treads
  x.fillStyle='#222';
  x.fillRect(2,20,22,4);x.fillRect(2,27,22,4);
  x.fillStyle='#333';
  for(var i=0;i<6;i++){x.fillRect(3+i*3.8,20.5,2,3);x.fillRect(3+i*3.8,27.5,2,3);}
  x.fillStyle='#3a3a3a';x.fillRect(2,20,22,1);x.fillRect(2,30,22,1);
  // Hull
  var hg=x.createLinearGradient(4,21,4,30);
  hg.addColorStop(0,c.light);hg.addColorStop(0.5,c.main);hg.addColorStop(1,c.dark);
  x.fillStyle=hg;x.fillRect(4,22,20,7);
  x.strokeStyle=c.dark;x.lineWidth=0.5;x.strokeRect(4,22,20,7);
  x.strokeStyle='rgba(0,0,0,0.2)';x.lineWidth=0.4;
  x.beginPath();x.moveTo(12,22);x.lineTo(12,29);x.stroke();
  x.beginPath();x.moveTo(18,22);x.lineTo(18,29);x.stroke();
  // Cargo bay
  x.fillStyle=c.dark;x.fillRect(4,23,8,5);
  x.strokeStyle='rgba(0,0,0,0.3)';x.lineWidth=0.3;x.strokeRect(4,23,8,5);
  x.fillStyle='#b8901a';x.beginPath();x.moveTo(5,27);x.quadraticCurveTo(8,23.5,11,27);x.closePath();x.fill();
  x.fillStyle='#d4aa30';x.beginPath();x.moveTo(6,26.5);x.quadraticCurveTo(8,24.5,10,26.5);x.closePath();x.fill();
  // Cab
  var cg=x.createLinearGradient(17,22,17,29);cg.addColorStop(0,c.accent);cg.addColorStop(1,c.main);
  x.fillStyle=cg;x.fillRect(17,23,5,5);
  x.strokeStyle=c.dark;x.lineWidth=0.4;x.strokeRect(17,23,5,5);
  x.fillStyle='#224466';x.fillRect(18,24,3,1.5);
  x.fillStyle='rgba(150,200,255,0.3)';x.fillRect(18,24,3,0.5);
  x.fillStyle='#444';x.fillRect(15,22.5,1.5,1.5);
  x.fillStyle='#555';x.fillRect(15,22,1.5,0.8);
  // Drill mount
  x.fillStyle='#555';x.fillRect(23,21.5,2,8);
  x.fillStyle='#666';x.fillRect(23.5,22,1,7);
  // Drill cone
  var dg=x.createLinearGradient(25,25.5,38,25.5);
  dg.addColorStop(0,'#aaa');dg.addColorStop(0.15,'#999');dg.addColorStop(0.4,'#808080');dg.addColorStop(0.7,'#707070');dg.addColorStop(0.9,'#888');dg.addColorStop(1,'#ccc');
  x.fillStyle=dg;
  x.beginPath();x.moveTo(25,19);x.lineTo(39,25.5);x.lineTo(25,32);x.closePath();x.fill();
  x.strokeStyle='rgba(255,255,255,0.35)';x.lineWidth=0.6;
  x.beginPath();x.moveTo(25,19);x.lineTo(39,25.5);x.stroke();
  x.strokeStyle='rgba(0,0,0,0.35)';
  x.beginPath();x.moveTo(25,32);x.lineTo(39,25.5);x.stroke();
  // Grooves
  x.strokeStyle='#555';x.lineWidth=0.9;
  for(var i=0;i<8;i++){var dx=25.5+i*1.7,t=i/8,sp=6*(1-t);x.beginPath();x.moveTo(dx,25.5-sp);x.quadraticCurveTo(dx+1,25.5,dx,25.5+sp);x.stroke();}
  x.strokeStyle='rgba(190,190,190,0.25)';x.lineWidth=0.35;
  for(var i=0;i<7;i++){var dx=26+i*1.7,t=i/7,sp=5*(1-t);x.beginPath();x.moveTo(dx,25.5-sp+0.6);x.quadraticCurveTo(dx+0.8,25.5,dx,25.5+sp-0.6);x.stroke();}
  // Rings
  x.strokeStyle='#666';x.lineWidth=1.2;x.beginPath();x.ellipse(26,25.5,1.3,6,0,0,Math.PI*2);x.stroke();
  x.strokeStyle='#777';x.lineWidth=0.8;x.beginPath();x.ellipse(30,25.5,1,4.2,0,0,Math.PI*2);x.stroke();
  x.beginPath();x.ellipse(34,25.5,0.7,2.5,0,0,Math.PI*2);x.stroke();
  // Tip
  x.fillStyle='#e8e8e8';x.beginPath();x.moveTo(37,24.5);x.lineTo(39,25.5);x.lineTo(37,26.5);x.closePath();x.fill();
  // Hydraulics
  x.strokeStyle='#666';x.lineWidth=1.5;
  x.beginPath();x.moveTo(21,22);x.lineTo(25,20);x.stroke();
  x.beginPath();x.moveTo(21,29);x.lineTo(25,31);x.stroke();
  x.strokeStyle=c.accent;x.lineWidth=0.7;
  x.beginPath();x.moveTo(22,22.5);x.lineTo(25.5,20.5);x.stroke();
  x.beginPath();x.moveTo(22,28.5);x.lineTo(25.5,30.5);x.stroke();
  // Headlight + dot + sparks
  x.fillStyle='rgba(255,255,220,0.9)';x.beginPath();x.arc(22,23,0.8,0,Math.PI*2);x.fill();
  x.fillStyle=c.light;x.beginPath();x.arc(8,22,1.5,0,Math.PI*2);x.fill();
  x.fillStyle='rgba(255,220,80,0.6)';x.beginPath();x.arc(38.5,24,0.8,0,Math.PI*2);x.fill();
  x.fillStyle='rgba(255,180,40,0.4)';x.beginPath();x.arc(38,27,0.6,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(39,25.5,0.4,0,Math.PI*2);x.fill();
  x.restore();
}

var container = document.getElementById('previews');
factions.forEach(function(f) {
  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h3>' + f.name + '</h3>';

  // Small (game size 32x32)
  var c1 = document.createElement('canvas');
  c1.width=128;c1.height=128;
  var x1=c1.getContext('2d');x1.imageSmoothingEnabled=true;
  drawHarvester(x1, f, 4);
  card.appendChild(c1);

  // Large preview (8x)
  var c2 = document.createElement('canvas');
  c2.width=320;c2.height=256;
  var x2=c2.getContext('2d');x2.imageSmoothingEnabled=true;
  drawHarvester(x2, f, 8);
  card.appendChild(c2);

  container.appendChild(card);
});
</script></body></html>
